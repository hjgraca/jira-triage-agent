# NetworkPolicy isolating the webhook listener (defense-in-depth).
#
# Primary control is the listener LoadBalancer's security group, locked to the
# CloudFront origin-facing prefix list in terraform/cloudfront.tf (R10b) — that
# is what stops a direct POST to the public LB. This NetworkPolicy is the
# in-cluster layer: it denies pod-to-pod ingress to the listener so a
# compromised workload elsewhere in the cluster (e.g. a GitLab pod) can't POST
# to the listener and bypass the CloudFront + HMAC gate.
#
# CAVEAT: with the AWS VPC CNI, pods receive VPC IPs and NetworkPolicy is only
# enforced when the VPC CNI's network-policy controller is enabled
# (ENABLE_NETWORK_POLICY=true on the aws-node DaemonSet, default on recent
# add-on versions). If it is not enabled, this manifest is inert and the LB
# security group (R10b) is the sole network control. Confirm enforcement before
# relying on this layer.
#
# Default-deny ingress for the listener pod, then allow only the webhook port
# from the LB hop (node/VPC CIDR). External CloudFront traffic is DNAT'd by the
# LoadBalancer and arrives from the node; in-cluster pods are denied because no
# podSelector/namespaceSelector source is allowed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triage-listener-isolation
  namespace: triage
  labels:
    app.kubernetes.io/managed-by: workshop-makefile
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: triage-listener
  policyTypes:
    - Ingress
  ingress:
    # Webhook traffic forwarded by the LoadBalancer arrives from the node/VPC
    # range. Keep this aligned with var.vpc_cidr (default 10.0.0.0/16).
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
