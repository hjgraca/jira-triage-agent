# Dedicated AWS LoadBalancer for GitLab git-over-SSH (port 22).
#
# Why this exists separately from the nginx-ingress LB:
#   The GitLab chart normally puts :22 on the shared nginx LB next to web
#   80/443. loadBalancerSourceRanges is Service-wide, so the only way to lock
#   SSH to a single IP there would also lock the web UI. We disable SSH on the
#   shared LB (nginx-ingress.controller.service.enableShell=false in
#   helm/gitlab-values.yaml) and route it through this LB instead, restricted
#   to the operator's public IP. Web 80/443 stays public on the nginx LB.
#
# Palisade Riddler / Epoxy: an open :22 (0.0.0.0/0) is what triggered the SSH
# auto-mitigation. loadBalancerSourceRanges below caps the LB security group to
# a single /32, so the finding does not re-fire.
#
# IMPORTANT: update loadBalancerSourceRanges when your public IP changes
#   curl https://checkip.amazonaws.com
apiVersion: v1
kind: Service
metadata:
  name: gitlab-shell-ssh
  namespace: gitlab
  labels:
    app: gitlab-shell
    app.kubernetes.io/managed-by: workshop-makefile
  annotations:
    # Classic ELB (matches the chart's nginx LB), instance target mode.
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  type: LoadBalancer
  # Lock the LB security group to the operator's public IP. Keep in sync with
  # the comment above; this is the control that satisfies the security finding.
  loadBalancerSourceRanges:
    - 79.169.211.160/32
  # Select the gitlab-shell pods directly (same selector the chart's
  # gitlab-gitlab-shell ClusterIP Service uses). Pods listen on 2222.
  selector:
    app: gitlab-shell
    release: gitlab
  ports:
    - name: ssh
      port: 22
      targetPort: 2222
      protocol: TCP
