# In-cluster Postgres for Jira (Bitnami postgresql chart).
# The Atlassian Jira chart expects an external database; this provides it
# inside the cluster for workshop scope. For durable use, swap to RDS.
#
# Bitnami removed their public Docker Hub image tags (Aug 2025 registry
# migration), so the chart's default docker.io/bitnami/* images 404. Repoint
# to the bitnamilegacy mirror, which still hosts the old tags.
global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: bitnamilegacy/postgresql

auth:
  username: jira
  password: jira-workshop-pw   # change me; referenced by jira-db-credentials secret
  database: jira

primary:
  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
