# Receiver: thin, STATELESS HTTP front door + a dedicated internet-facing LB.
#
# Stateless (no in-memory dedupe/limiter/bot-identity), so replicas may be >1 and
# the strategy is RollingUpdate. Per request it authenticates, gates, and creates
# a one-shot run Job (the k8s-job dispatcher); Kubernetes provides dedupe
# (deterministic Job name) and concurrency (ResourceQuota in rbac.yaml).
#
# Why a dedicated LB (not the shared GitLab nginx ELB): locking inbound to
# CloudFront-only can't be done on the shared Classic ELB without breaking
# GitLab's public web, and the shared nginx ingress hits a CloudFront Host-header
# trap. The LB SG is locked to the CloudFront origin prefix list in terraform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-receiver
  namespace: triage
  labels:
    app.kubernetes.io/name: agent-receiver
spec:
  # Stateless → safe to scale out. (Dedupe + concurrency are enforced by K8s,
  # not in-process, so multiple receivers can't double-dispatch: identical Job
  # names collide with 409.)
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-receiver
    spec:
      serviceAccountName: agent-receiver
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: receiver
          # The agent image (engine + harness + one agent). Same image the run
          # Jobs use — the receiver just passes it to the dispatcher as RUN_IMAGE.
          image: 746792595426.dkr.ecr.us-west-2.amazonaws.com/triage-agent:jira-triage-pi
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: WEBHOOK_PATH
              value: "/webhook"
            # Pluggable axes (engine-agnostic):
            - name: TRIGGER
              value: "jira"
            - name: HARNESS
              value: "pi"
            - name: DISPATCH
              value: "k8s-job"
            - name: AGENT_PATH
              value: "/agents/jira-triage"
            - name: MODEL
              value: "us.anthropic.claude-sonnet-4-6"
            # Trust the in-cluster API server CA (the k8s-job dispatcher POSTs to it).
            - name: NODE_EXTRA_CA_CERTS
              value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            # ── Run-Job shape the dispatcher fills in ──────────────────────────
            - name: RUN_IMAGE
              value: 746792595426.dkr.ecr.us-west-2.amazonaws.com/triage-agent:jira-triage-pi
            - name: RUN_SERVICE_ACCOUNT
              value: "agent-runner"            # IRSA-bound; model access lives here
            - name: RUN_NAME_PREFIX
              value: "agent-run"
            - name: RUN_TTL_SECONDS
              value: "3600"                    # auto-clean finished run pods
            - name: RUN_BACKOFF_LIMIT
              value: "1"
            - name: RUN_TIMEOUT_MS
              value: "300000"                  # → Job activeDeadlineSeconds
            # The Secret whose keys the RUN Job loads as env (the agent's own
            # credentials — Jira/GitLab tokens, etc.). The receiver itself does
            # NOT read these; only the runner needs them.
            - name: RUN_ENV_FROM_SECRET
              value: "agent-runtime-secrets"
            # ── Trigger/agent config (engine-neutral here; Jira-isms live in the
            #    jira trigger, which reads JIRA_BOT_ACCOUNT_ID below) ───────────
            - name: AUTHORIZED_ACTORS
              value: "557058:2ead7aac-3eea-430f-9f79-4967084b8264"
            # Webhook auth secrets the RECEIVER checks (not the runner):
            - name: WEBHOOK_HMAC_SECRET
              valueFrom: { secretKeyRef: { name: agent-receiver-secrets, key: webhook-hmac-secret, optional: true } }
            - name: WEBHOOK_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: agent-receiver-secrets, key: webhook-shared-secret, optional: true } }
            # Jira bot accountId for the loop guard — read by the jira trigger,
            # NOT by the engine. Obtain once via GET /rest/api/3/myself.
            - name: JIRA_BOT_ACCOUNT_ID
              valueFrom: { secretKeyRef: { name: agent-receiver-secrets, key: jira-bot-account-id, optional: true } }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { memory: 192Mi }     # thin: it only creates Jobs, never runs a harness
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            # Ready as soon as it's listening — no bot-identity resolution to wait
            # on (that Jira /myself call is gone from the engine).
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-receiver
  namespace: triage
  labels:
    app.kubernetes.io/name: agent-receiver
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  type: LoadBalancer
  # R10b origin lock: only CloudFront origin-facing IPs may reach this public LB
  # (terraform output cloudfront_origin_cidrs). Refresh if AWS updates the list.
  loadBalancerSourceRanges:
    - 13.124.199.0/24
    - 130.176.0.0/18
    - 130.176.128.0/21
    - 130.176.136.0/23
    - 130.176.140.0/22
    - 130.176.144.0/20
    - 130.176.160.0/19
    - 130.176.192.0/19
    - 130.176.64.0/21
    - 130.176.72.0/22
    - 130.176.76.0/24
    - 130.176.78.0/23
    - 130.176.80.0/22
    - 130.176.86.0/23
    - 130.176.88.0/21
    - 130.176.96.0/19
    - 15.158.0.0/16
    - 18.68.0.0/16
    - 204.246.166.0/24
    - 205.251.218.0/24
    - 3.172.0.0/18
    - 3.172.64.0/18
    - 3.29.57.0/26
    - 52.46.0.0/18
    - 52.82.128.0/23
    - 52.82.134.0/23
    - 54.182.128.0/20
    - 54.182.144.0/21
    - 54.182.154.0/23
    - 54.182.156.0/22
    - 54.182.160.0/21
    - 54.182.172.0/22
    - 54.182.176.0/21
    - 54.182.184.0/22
    - 54.182.188.0/23
    - 54.182.224.0/21
    - 54.182.240.0/21
    - 54.182.248.0/22
    - 54.239.134.0/23
    - 54.239.170.0/23
    - 54.239.204.0/22
    - 54.239.208.0/21
    - 64.252.128.0/18
    - 64.252.64.0/18
    - 70.132.0.0/18
  selector:
    app.kubernetes.io/name: agent-receiver
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
