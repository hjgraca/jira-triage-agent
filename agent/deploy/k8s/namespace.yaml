# Namespace + two ServiceAccounts for the agent (run-as-Job model).
#
#   agent-receiver — used by the receiver Deployment. Needs RBAC to create Jobs
#                    (rbac.yaml). No cloud creds needed for the receiver itself.
#   agent-runner   — used by each run Job's pod. IRSA-bound: its annotation
#                    carries the IAM role ARN that grants Bedrock (for the pi
#                    harness). Set this to YOUR Terraform output before applying:
#                      terraform -chdir=agent/deploy/terraform output -raw triage_bedrock_role_arn
apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    app.kubernetes.io/part-of: agent-runner
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-receiver
  namespace: agents
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runner
  namespace: agents
  annotations:
    # REPLACE with your triage_bedrock_role_arn output (only needed for harnesses
    # that use IRSA, e.g. pi → Bedrock). Harmless to leave for others.
    #   terraform -chdir=agent/deploy/terraform output -raw triage_bedrock_role_arn
    # This is a PLACEHOLDER pointing at the dev lab account — leaving it as-is
    # binds IRSA to a role in someone else's account, so Bedrock fails AccessDenied.
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<NAME>-triage-bedrock
