# Allowed-value sets the triage skill is permitted to write (R2). Copy to
# k8s/triage-config.yaml, fill in the REAL values from the live KAN project
# (Step 0.5 probe / U7), and apply. The skill scripts read this at
# /etc/triage/config.json and FAIL CLOSED on any value not listed here.
#
#   priorities  — exact Jira priority names for the project's scheme
#   assignees   — Jira accountIds of the on-call pool ONLY (R2c: no black-holes).
#                 Empty = the agent never auto-assigns (it recommends an owner in
#                 the comment instead). The KAN probe found no assignable humans,
#                 so this stays [] until a real on-call pool exists.
#   issuetypes  — exact issue type names. KAN has Task/Story/Epic (+ Subtask,
#                 excluded — converting to/from subtask is special-cased). No Bug
#                 type exists; "bug" is a category LABEL, not an issue type.
#   labels      — the curated label set the agent may apply
#   transitions — allowed workflow transition IDs (KAN: 11 To Do, 21 In Progress,
#                 31 In Review, 41 Done). Empty = the agent makes no status moves.
#
# Values below are the confirmed live KAN sets (Step 0.5 probe, 2026-06-02).
apiVersion: v1
kind: ConfigMap
metadata:
  name: triage-config
  namespace: triage
  labels:
    app.kubernetes.io/managed-by: workshop-makefile
data:
  config.json: |
    {
      "labels": ["bug", "enhancement", "needs-info", "ready-for-agent", "ready-for-human", "wontfix", "needs-human"],
      "priorities": ["Highest", "High", "Medium", "Low", "Lowest"],
      "assignees": [],
      "issuetypes": ["Task", "Story", "Epic"],
      "transitions": []
    }
