# TEMPLATE — do NOT put real values here and do NOT commit the filled copy.
#
# Copy to k8s/triage-secrets.yaml (gitignored) and fill in real values, then:
#   kubectl apply -f k8s/triage-secrets.yaml
#
# The triage agent's only long-lived application credentials (R13). The model
# credential is NOT here — Bedrock auth is IRSA (see triage-namespace.yaml).
#
# How to produce each value:
#
#   JIRA_EMAIL        Atlassian account email of the dedicated triage bot user.
#
#   JIRA_API_TOKEN    API token for that bot user, from
#                     https://id.atlassian.com/manage-profile/security/api-tokens
#                     Use a dedicated bot account so its writes are attributable
#                     and the loop-guard disclaimer marker is consistent (R7).
#
#   GITLAB_READ_TOKEN MINIMUM-PRIVILEGE GitLab token (R13). Prefer a
#                     project-scoped DEPLOY TOKEN with read_repository only;
#                     add read_api only if the routing queries need it. Do NOT
#                     use a full-API personal access token.
#
#   WEBHOOK_HMAC_SECRET  >=32 bytes from a CSPRNG (R10d). Generate with:
#                     openssl rand -hex 32
#                     Use the SAME value when registering the Jira system
#                     webhook's "secret" field (see Configure Jira).
#                     Required only for the system-webhook (HMAC) trigger path.
#
#   AUTOMATION_SHARED_SECRET  >=32 bytes from a CSPRNG. Generate with:
#                     openssl rand -hex 32
#                     Sent by the Jira Automation rule in the X-Triage-Token
#                     header (Jira Automation can't compute an HMAC). Required
#                     only for the Automation-rule trigger path; leave as a
#                     placeholder to disable it. Treat like a password.
#
# At least one of WEBHOOK_HMAC_SECRET / AUTOMATION_SHARED_SECRET must be real,
# depending on which trigger path you use (see Configure Jira "Register the trigger").
#
#   KIRO_API_KEY      Only for HARNESS=kiro-cli. The kiro-cli harness uses its
#                     own backend (Kiro Pro/Pro+/Power) via this key; pi uses
#                     IRSA and ignores it. Generate in the Kiro portal.
#
#   ANTHROPIC_API_KEY Only for HARNESS=opencode. The provider API key opencode
#                     authenticates with. opencode reads ANTHROPIC_API_KEY (or
#                     your provider's env var) directly from env — name the key
#                     for your provider. pi/kiro ignore it.
#
# stringData lets you paste plain values; Kubernetes base64-encodes them.
#
# IMPORTANT — keys are UPPER_SNAKE_CASE on purpose. The run Job loads this whole
# secret via `envFrom`, which maps each key VERBATIM to an env var. The bundled
# scripts (jira.sh/gitlab.sh) and the kiro/opencode harnesses read standard env
# names (JIRA_API_TOKEN, GITLAB_READ_TOKEN, KIRO_API_KEY, …). Dash-cased keys
# (jira-api-token) are NOT valid shell identifiers and get silently dropped, so
# the scripts would fail "JIRA_* is required". Keep these names as-is.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agents
  labels:
    app.kubernetes.io/part-of: agent-runner
type: Opaque
stringData:
  JIRA_EMAIL: "REPLACE_ME@example.com"
  JIRA_API_TOKEN: "REPLACE_ME"
  GITLAB_READ_TOKEN: "REPLACE_ME"
  WEBHOOK_HMAC_SECRET: "REPLACE_ME_openssl_rand_hex_32"
  AUTOMATION_SHARED_SECRET: "REPLACE_ME_openssl_rand_hex_32"
  # Only for HARNESS=kiro-cli (the kiro-cli harness authenticates to its own
  # backend with this key — pi uses IRSA and ignores it). Leave the placeholder
  # if you run pi; the receiver env marks it optional. Format: ksk_...
  KIRO_API_KEY: "REPLACE_ME_ksk_xxxxxxxx"
  # Only for HARNESS=opencode — the provider API key opencode uses (e.g. an
  # Anthropic key). opencode reads ANTHROPIC_API_KEY directly from env, so name
  # the key for YOUR provider's env var. Optional otherwise.
  ANTHROPIC_API_KEY: "REPLACE_ME_provider_api_key"
