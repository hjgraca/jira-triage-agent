# Webhook listener: Deployment + a dedicated internet-facing LoadBalancer.
#
# Why a dedicated LB (KTD10), not the shared GitLab nginx ELB:
#   - Locking inbound to CloudFront-only (R10b) can't be done on the shared
#     Classic ELB without breaking GitLab's public web (the same Service-wide
#     source-range constraint that forced k8s/gitlab-shell-ssh-lb.yaml).
#   - Routing through the shared nginx ingress hits a CloudFront Host-header
#     trap (nginx routes by Host; CloudFront doesn't forward the viewer Host to
#     a custom origin). A dedicated LB with no host-based routing avoids both.
#
# CloudFront is this LB's origin. The LB security group is locked to the
# CloudFront origin-facing prefix list in terraform/cloudfront.tf (R10b), so the
# public LB cannot be POSTed directly.
#
# IMPORTANT: set loadBalancerSourceRanges OR the SG lock (terraform/cloudfront.tf)
# before exposing — see README "Triage agent".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-listener
  namespace: triage
  labels:
    app.kubernetes.io/name: triage-listener
    app.kubernetes.io/managed-by: workshop-makefile
spec:
  # MUST stay at 1. The dedupe cache (R8) and spawn limiter / daily budget
  # (R10c) are in-memory and per-pod; with replicas>1 each pod would dedupe and
  # rate-limit independently, so duplicates and over-budget spend would slip
  # through. Scaling out requires moving that state to a shared store first.
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) so two pods never run concurrently during a
    # rollout — same single-writer invariant as above.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: triage-listener
  template:
    metadata:
      labels:
        app.kubernetes.io/name: triage-listener
    spec:
      serviceAccountName: triage-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: listener
          # Replace with the pushed image (see Makefile triage-image target).
          image: 746792595426.dkr.ecr.us-west-2.amazonaws.com/triage-agent:latest
          # tini/--init is provided by the image entrypoint (KTD9) to reap
          # finished pi subprocesses.
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: WEBHOOK_PATH
              value: "/jira-webhook"
            # The AGENT DEFINITION: the skill dir whose SKILL.md frontmatter
            # declares the prompt that drives the agent. Point this at a
            # different skill to run a different agent — no code/image change
            # (as long as the image bakes that skill in). SKILL_PATH is a
            # back-compat alias.
            - name: AGENT_PATH
              value: "/agents/jira-triage"
            # Which TRIGGER adapter authenticates/parses/gates the webhook:
            #   "jira"    (default) Jira webhook / Automation rule
            #   "generic" signed POST whose JSON body becomes the prompt vars
            - name: TRIGGER
              value: "jira"
            # Which headless harness to spawn per webhook:
            #   "pi"       (default) Bedrock via IRSA — no key needed
            #   "kiro-cli" its own backend via KIRO_API_KEY
            #   "opencode" `opencode run`; provider creds via OPENCODE_PROVIDER_KEY
            #              (mapped to the provider's env var below) or auth.json
            # The image must have that harness baked in (Dockerfile build args).
            - name: HARNESS
              value: "pi"
            # Model id passed to the harness. pi uses it directly; kiro-cli
            # ignores it (model is set via its default/agent config).
            - name: TRIAGE_MODEL
              value: "us.anthropic.claude-sonnet-4-6"
            - name: AWS_REGION
              value: "us-west-2"
            - name: MAX_CONCURRENT
              value: "3"
            - name: SPAWN_CEILING
              value: "60"
            - name: DAILY_BUDGET
              value: "500"
            # Comma-separated Jira accountIds allowed to trigger via the label (R6b).
            - name: AUTHORIZED_ACTORS
              value: "557058:2ead7aac-3eea-430f-9f79-4967084b8264"
            - name: JIRA_BASE_URL
              value: "https://henriquegraca.atlassian.net"
            - name: GITLAB_BASE_URL
              value: "http://gitlab-webservice-default.gitlab.svc:8080"
            - name: TRIAGE_CONFIG
              value: "/etc/triage/config.json"
            # Secrets (R13) — from k8s/triage-secrets.yaml
            - name: JIRA_EMAIL
              valueFrom: { secretKeyRef: { name: triage-secrets, key: jira-email } }
            - name: JIRA_API_TOKEN
              valueFrom: { secretKeyRef: { name: triage-secrets, key: jira-api-token } }
            - name: GITLAB_READ_TOKEN
              valueFrom: { secretKeyRef: { name: triage-secrets, key: gitlab-read-token } }
            - name: WEBHOOK_HMAC_SECRET
              valueFrom: { secretKeyRef: { name: triage-secrets, key: webhook-hmac-secret } }
            # Shared-secret bearer for the Jira Automation path (R10a-bis). Empty
            # disables that path; set it to enable Automation-rule triggering.
            - name: AUTOMATION_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: triage-secrets, key: automation-shared-secret } }
            # API key for the kiro-cli harness (HARNESS=kiro-cli). optional:true
            # so pi deployments — which authenticate via IRSA — start fine
            # without this key present in the secret.
            - name: KIRO_API_KEY
              valueFrom: { secretKeyRef: { name: triage-secrets, key: kiro-api-key, optional: true } }
            # Provider credential for the opencode harness (HARNESS=opencode).
            # opencode reads provider env vars; set the env NAME its provider
            # expects (e.g. ANTHROPIC_API_KEY) by editing the `name:` below, or
            # bake an auth.json into the image instead. optional:true so other
            # harnesses start without it.
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: triage-secrets, key: opencode-provider-key, optional: true } }
          volumeMounts:
            # Allowed-value sets the skill reads (R2); fail-closed if absent.
            - name: triage-config
              mountPath: /etc/triage
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # Bounds concurrent pi runs' memory footprint; pair with
              # MAX_CONCURRENT so a burst can't OOM the node.
              memory: 2Gi
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            # Fail closed (R7): not Ready until GET /myself resolves the bot
            # accountId, so webhooks are never served without a loop guard.
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: triage-config
          configMap:
            name: triage-config
---
apiVersion: v1
kind: Service
metadata:
  name: triage-listener
  namespace: triage
  labels:
    app.kubernetes.io/name: triage-listener
    app.kubernetes.io/managed-by: workshop-makefile
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  type: LoadBalancer
  # R10b origin lock: only CloudFront origin-facing IPs may reach this public
  # LB. These are the com.amazonaws.global.cloudfront.origin-facing managed
  # prefix list ranges (terraform output cloudfront_origin_cidrs). Refresh if
  # AWS updates the list: re-run the terraform output and re-apply.
  loadBalancerSourceRanges:
    - 13.124.199.0/24
    - 130.176.0.0/18
    - 130.176.128.0/21
    - 130.176.136.0/23
    - 130.176.140.0/22
    - 130.176.144.0/20
    - 130.176.160.0/19
    - 130.176.192.0/19
    - 130.176.64.0/21
    - 130.176.72.0/22
    - 130.176.76.0/24
    - 130.176.78.0/23
    - 130.176.80.0/22
    - 130.176.86.0/23
    - 130.176.88.0/21
    - 130.176.96.0/19
    - 15.158.0.0/16
    - 18.68.0.0/16
    - 204.246.166.0/24
    - 205.251.218.0/24
    - 3.172.0.0/18
    - 3.172.64.0/18
    - 3.29.57.0/26
    - 52.46.0.0/18
    - 52.82.128.0/23
    - 52.82.134.0/23
    - 54.182.128.0/20
    - 54.182.144.0/21
    - 54.182.154.0/23
    - 54.182.156.0/22
    - 54.182.160.0/21
    - 54.182.172.0/22
    - 54.182.176.0/21
    - 54.182.184.0/22
    - 54.182.188.0/23
    - 54.182.224.0/21
    - 54.182.240.0/21
    - 54.182.248.0/22
    - 54.239.134.0/23
    - 54.239.170.0/23
    - 54.239.204.0/22
    - 54.239.208.0/21
    - 64.252.128.0/18
    - 64.252.64.0/18
    - 70.132.0.0/18
  selector:
    app.kubernetes.io/name: triage-listener
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
