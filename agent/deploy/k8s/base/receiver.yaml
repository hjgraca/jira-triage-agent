# BASE receiver — in-cluster (ClusterIP), works on ANY Kubernetes.
#
# This is the default: the input source (Jira DC, or any in-cluster poster)
# reaches the receiver over in-cluster DNS, so there is NO internet exposure and
# no load balancer. Posts go to:
#
#     http://agent-receiver.agents.svc.cluster.local/jira-webhook
#
# Configured here for the Jira Data Center in-cluster case:
#   1. TRIGGER=jira-dc          (actor by user.name/key; DC-shaped dedupe)
#   2. Service type: ClusterIP  (no LB annotations, no loadBalancerClass)
# Swap TRIGGER for another input (jira / github / generic) as needed.
#
# This is an IN-CLUSTER receiver (ClusterIP): the input source (e.g. Jira running
# in the same cluster) reaches it over the in-cluster DNS name. If you need to
# accept a webhook from OUTSIDE the cluster, expose this Service with your own
# Ingress/LoadBalancer + TLS and lock it down — orthogonal to everything here.
#
# Pair this with base/ingress-netpol.yaml (lets the input namespace reach :8080)
# and the matching agent image (e.g. jira-triage-dc → REST v2 / Bearer PAT).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-receiver
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-receiver
spec:
  replicas: 2 # stateless → scale freely
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-receiver
    spec:
      serviceAccountName: agent-receiver
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      # PRIVATE REGISTRY ONLY (Nexus/Harbor/…): uncomment and name a
      # docker-registry pull Secret you created in the agents namespace, e.g.
      #   kubectl -n agents create secret docker-registry regcred \
      #     --docker-server=nexus.corp.internal:8891 --docker-username=… --docker-password=…
      # Leave commented for public images or ECR pulled via the node role.
      # (Also set IMAGE_PULL_SECRET in the receiver env below so RUN Jobs get it too.)
      # imagePullSecrets:
      #   - name: regcred
      containers:
        - name: receiver
          # REPLACE with your built+pushed DC agent image — ANY registry
          # (ECR, Nexus, Harbor, GHCR, …). See 04b Step 2.
          #   ECR:   <ACCT>.dkr.ecr.<REGION>.amazonaws.com/triage-agent:jira-triage-dc-pi
          #   Nexus: nexus.corp.internal:8891/triage-agent:jira-triage-dc-pi
          image: <REGISTRY>/triage-agent:jira-triage-dc-pi
          command: ["node", "runtime/receiver.js"]
          ports:
            - { name: http, containerPort: 8080 }
          env:
            # In-cluster path: the webhook URL Jira posts to is the Service DNS
            # name + this path → http://agent-receiver.agents.svc.cluster.local/jira-webhook
            - { name: WEBHOOK_PATH, value: "/jira-webhook" }
            # Data Center trigger adapter (vs "jira" for Cloud): actor allowlist
            # keys on user.name/user.key, dedupe synthesizes <key>-<changelog.id>.
            - { name: TRIGGER, value: "jira-dc" }
            # The image to stamp into run Jobs — the SAME DC image as above.
            - { name: AGENT_IMAGE, value: "<REGISTRY>/triage-agent:jira-triage-dc-pi" }
            # PRIVATE REGISTRY ONLY: name of the docker-registry Secret (above) so
            # the kubelet can pull the run-Job image. Match the imagePullSecrets name.
            # Leave unset/empty for public images or ECR via the node role.
            # - { name: IMAGE_PULL_SECRET, value: "regcred" }
            # Non-secret env for each run Job. pi → keyless Bedrock via IRSA
            # (EKS: apply overlays/eks-bedrock). On any other cluster use a
            # key-based harness (HARNESS=opencode|kiro-cli, see overlays/vanilla).
            # For pi, MODEL + AWS_REGION MUST match what overlays/eks-bedrock/
            # irsa-bedrock.sh scoped the policy to or Bedrock denies InvokeModel.
            # GITLAB_BASE_URL is the EXTERNAL GitLab URL (HTTPS).
            - { name: RUN_ENV, value: "HARNESS=pi,MODEL=eu.anthropic.claude-sonnet-4-6,AWS_REGION=eu-west-1,GITLAB_BASE_URL=https://<your-gitlab-host>" }
            # Run Jobs load creds themselves (envFrom) — the receiver never sees them.
            - { name: RUN_SECRET, value: "agent-secrets" }
            - { name: RUN_CONFIGMAP, value: "agent-config" }
            - { name: NODE_EXTRA_CA_CERTS, value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt" }
            # DC system webhooks sign with X-Hub-Signature (sha256=…) → HMAC path.
            # Set WEBHOOK_HMAC_SECRET in agent-secrets to the SAME value as the
            # webhook's "secret" field. (AUTOMATION_SHARED_SECRET only needed if
            # you trigger via Automation for Jira instead of a system webhook.)
            - name: WEBHOOK_HMAC_SECRET
              valueFrom: { secretKeyRef: { name: agent-secrets, key: WEBHOOK_HMAC_SECRET, optional: true } }
            - name: SHARED_SECRET
              valueFrom: { secretKeyRef: { name: agent-secrets, key: AUTOMATION_SHARED_SECRET, optional: true } }
            # Who may trigger via the label (R6b) — DC USERNAMES (user.name) or
            # user keys, comma-separated. NOT Cloud accountIds.
            - name: AUTHORIZED_ACTORS
              value: "<dc-username-1>,<dc-username-2>"
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
---
# Plain ClusterIP — reachable only from inside the cluster. Jira (another
# namespace, same cluster) posts here directly; no LB, no public IP. The DNS
# name is agent-receiver.agents.svc.cluster.local.
apiVersion: v1
kind: Service
metadata:
  name: agent-receiver
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-receiver
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-receiver
  ports:
    - { name: http, port: 80, targetPort: http }
