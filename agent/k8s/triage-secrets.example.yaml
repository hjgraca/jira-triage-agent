# TEMPLATE — do NOT put real values here and do NOT commit the filled copy.
#
# Copy to k8s/triage-secrets.yaml (gitignored) and fill in real values, then:
#   kubectl apply -f k8s/triage-secrets.yaml
#
# The triage agent's only long-lived application credentials (R13). The model
# credential is NOT here — Bedrock auth is IRSA (see triage-namespace.yaml).
#
# How to produce each value:
#
#   jira-email        Atlassian account email of the dedicated triage bot user.
#
#   jira-api-token    API token for that bot user, from
#                     https://id.atlassian.com/manage-profile/security/api-tokens
#                     The bot's identity (this token) is what the listener's
#                     loop-guard keys on via GET /myself (R7).
#
#   gitlab-read-token MINIMUM-PRIVILEGE GitLab token (R13). Prefer a
#                     project-scoped DEPLOY TOKEN with read_repository only;
#                     add read_api only if the routing queries need it. Do NOT
#                     use a full-API personal access token.
#
#   webhook-hmac-secret  >=32 bytes from a CSPRNG (R10d). Generate with:
#                     openssl rand -hex 32
#                     Use the SAME value when registering the Jira system
#                     webhook's "secret" field (see README "Triage agent").
#                     Required only for the system-webhook (HMAC) trigger path.
#
#   automation-shared-secret  >=32 bytes from a CSPRNG. Generate with:
#                     openssl rand -hex 32
#                     Sent by the Jira Automation rule in the X-Triage-Token
#                     header (Jira Automation can't compute an HMAC). Required
#                     only for the Automation-rule trigger path; leave as a
#                     placeholder to disable it. Treat like a password.
#
# At least one of webhook-hmac-secret / automation-shared-secret must be real,
# depending on which trigger path you use (see README "Register the trigger").
#
#   kiro-api-key      Only for HARNESS=kiro-cli. The kiro-cli harness uses its
#                     own backend (Kiro Pro/Pro+/Power) via this key; pi uses
#                     IRSA and ignores it. Generate in the Kiro portal.
#
#   opencode-provider-key  Only for HARNESS=opencode. The provider API key
#                     opencode authenticates with (e.g. an Anthropic key). The
#                     listener maps it to the provider env var ANTHROPIC_API_KEY
#                     by default — change the env `name:` in triage-listener.yaml
#                     to match your provider. pi/kiro ignore it.
#
# stringData lets you paste plain values; Kubernetes base64-encodes them.
apiVersion: v1
kind: Secret
metadata:
  name: triage-secrets
  namespace: triage
  labels:
    app.kubernetes.io/managed-by: workshop-makefile
type: Opaque
stringData:
  jira-email: "REPLACE_ME@example.com"
  jira-api-token: "REPLACE_ME"
  gitlab-read-token: "REPLACE_ME"
  webhook-hmac-secret: "REPLACE_ME_openssl_rand_hex_32"
  automation-shared-secret: "REPLACE_ME_openssl_rand_hex_32"
  # Only for HARNESS=kiro-cli (the kiro-cli harness authenticates to its own
  # backend with this key — pi uses IRSA and ignores it). Leave the placeholder
  # if you run pi; the listener env marks it optional. Format: ksk_...
  kiro-api-key: "REPLACE_ME_ksk_xxxxxxxx"
  # Only for HARNESS=opencode — the provider API key opencode uses (e.g. an
  # Anthropic key). Mapped to ANTHROPIC_API_KEY by default in the listener;
  # change that env name for a different provider. Optional otherwise.
  opencode-provider-key: "REPLACE_ME_provider_api_key"
