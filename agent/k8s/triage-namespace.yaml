# Namespace + ServiceAccount for the Jira triage agent.
#
# The ServiceAccount is IRSA-bound: its annotation carries the IAM role ARN that
# the Bedrock module creates (module.triage_bedrock_irsa.iam_role_arn). EKS
# injects AWS_WEB_IDENTITY_TOKEN_FILE + AWS_ROLE_ARN into pods using this SA, so
# pi reaches Bedrock with no static credential (R12).
#
# IMPORTANT: set the role-arn annotation below to YOUR Terraform output before
# applying. The value committed here is the workshop lab's role:
#   workshop:  terraform -chdir=workshop/terraform output -raw triage_bedrock_role_arn
#   customer:  terraform -chdir=agent/terraform   output -raw triage_bedrock_role_arn
apiVersion: v1
kind: Namespace
metadata:
  name: triage
  labels:
    app.kubernetes.io/managed-by: workshop-makefile
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: triage-agent
  namespace: triage
  labels:
    app.kubernetes.io/name: triage-agent
    app.kubernetes.io/managed-by: workshop-makefile
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::746792595426:role/workshop-triage-bedrock
